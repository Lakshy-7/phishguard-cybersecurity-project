<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PhishGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-login">
<div class="container" style="max-width:480px">
  <div class="text-center mb-4">
    <i class="bi bi-shield-shaded text-danger" style="font-size:3rem"></i>
    <h2 class="fw-bold">PhishGuard</h2>
    <p class="text-muted small">Create your account</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show">{{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    {% endfor %}{% endif %}
  {% endwith %}

  <div class="card border-secondary shadow-lg">
    <div class="card-body p-4">
      <h5 class="card-title mb-4"><i class="bi bi-person-plus-fill me-2 text-danger"></i>Register</h5>
      <form method="POST" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" name="full_name" placeholder="John Doe">
        </div>
        <div class="mb-3">
          <label class="form-label">Username <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="username" placeholder="johndoe" required minlength="3">
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address <span class="text-danger">*</span></label>
          <input type="email" class="form-control" name="email" placeholder="john@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password <span class="text-danger">*</span></label>
          <input type="password" class="form-control" name="password" placeholder="Min. 8 characters" required minlength="8">
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
          <input type="password" class="form-control" name="confirm_password" placeholder="Repeat password" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold">
          <i class="bi bi-person-check me-2"></i>Create Account
        </button>
      </form>
      <hr><p class="text-center small mb-0">
        Already have an account? <a href="{{ url_for('auth.login') }}" class="text-danger">Sign in</a>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
