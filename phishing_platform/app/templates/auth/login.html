<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PhishGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-login">

<div class="container" style="max-width:440px">
  <!-- Logo -->
  <div class="text-center mb-4">
    <div class="logo-shield mb-3">
      <i class="bi bi-shield-shaded text-danger" style="font-size:3.5rem"></i>
    </div>
    <h2 class="fw-bold">PhishGuard</h2>
    <p class="text-muted small">Phishing Detection & Awareness Platform</p>
  </div>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Login card -->
  <div class="card border-secondary shadow-lg">
    <div class="card-body p-4">
      <h5 class="card-title mb-4"><i class="bi bi-lock-fill me-2 text-danger"></i>Sign In</h5>

      <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Enter username" required autofocus autocomplete="username">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-key"></i></span>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Enter password" required autocomplete="current-password">
          </div>
        </div>

        <div class="mb-4 d-flex align-items-center justify-content-between">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
            <label class="form-check-label small" for="remember_me">Remember me</label>
          </div>
        </div>

        <button type="submit" class="btn btn-danger w-100 fw-bold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <hr class="my-3">
      <p class="text-center small mb-0">
        No account? <a href="{{ url_for('auth.register') }}" class="text-danger">Register here</a>
      </p>
    </div>
  </div>

  <p class="text-center text-muted small mt-3">
    <i class="bi bi-info-circle me-1"></i>Default login: <strong>admin / admin123</strong>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
